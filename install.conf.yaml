- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.zsh:
    ~/.zshrc:
    ~/.gitconfig:
    ~/.tmux.conf: tmux.conf
    ~/.claude/settings.json: .claude/settings.json
    ~/.agents: .agents

- shell:
  - git submodule sync --recursive
  # the following have to run after linking ~/.gitconfig
  - [git submodule update --init --recursive, Installing submodules]
  - cd fonts && ./install.sh
