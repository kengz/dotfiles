- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- create:
    - ~/.claude
    - ~/.agents

- link:
    ~/.dotfiles: ''
    ~/.zsh:
    ~/.zshrc:
    ~/.gitconfig:
    ~/.tmux.conf: tmux.conf
    # Share just the manifest. Skill content goes to ~/.agents/skills/ per-machine.
    ~/.agents/.skill-lock.json:
      path: .agents/.skill-lock.json
      force: true

- shell:
  # settings.json is COPIED (not symlinked) so per-machine /theme & /model writes
  # stay local. To pick up upstream changes: delete the local file + re-install.
  - description: install ~/.claude/settings.json (per-machine copy)
    stdout: true
    stderr: true
    command: |
      if [ ! -f ~/.claude/settings.json ]; then
        cp .claude/settings.json ~/.claude/settings.json
        echo "installed ~/.claude/settings.json"
      fi

  # Restore skills from the manifest via `npx skills`. Only installs MISSING
  # entries — repeat runs are no-ops. (npx writes hashes back to the lock on
  # any add; rare drift on a fresh box is harmless on a beast.)
  - description: restore skills from ~/.agents/.skill-lock.json
    stdout: true
    stderr: true
    command: |
      command -v npx >/dev/null || { echo "npx missing — install Node, then re-run"; exit 0; }
      python3 - <<'PY'
      import json, os, subprocess, sys
      lock = os.path.expanduser("~/.agents/.skill-lock.json")
      skills = os.path.expanduser("~/.agents/skills")
      data = json.load(open(lock))
      missing = {}
      for name, info in data.get("skills", {}).items():
          if not os.path.exists(f"{skills}/{name}/SKILL.md"):
              missing.setdefault(info["source"], []).append(name)
      if not missing:
          print("  all skills installed"); sys.exit(0)
      for src, names in missing.items():
          args = ["npx", "--yes", "skills", "add", "-g", src, "--copy", "--yes"]
          for n in sorted(names): args += ["--skill", n]
          print(f"  installing {src}: {sorted(names)}")
          subprocess.run(args, check=False)
      PY

  - git submodule sync --recursive
  - [git submodule update --init --recursive, Installing submodules]
  - cd fonts && ./install.sh
