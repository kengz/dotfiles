# Launch shells as login + interactive so ~/.zshrc and ~/.profile run
# (gets ~/.local/bin, homebrew, etc. onto PATH without any per-tool env hacks).
set -g default-command "${SHELL} -l"

# Use the latest-active client's size when multiple clients attach.
# Without this, tmux shrinks to the smallest client (the phone) — annoying on Mac.
set -g window-size latest

# Don't rename windows automatically — let me name them
set -g allow-rename off

# Big scrollback
set -g history-limit 100000

# Mouse on (scroll, click panes, resize)
set -g mouse on

# Faster repeat (Ctrl-b then arrow within Nms is treated as repeated)
set -g repeat-time 1000

# Pass through 256-color and true-color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Renumber windows when one is closed
set -g renumber-windows on

# Claude Code requirements (per code.claude.com/docs/en/terminal-config).
# allow-passthrough was added in tmux 3.3; guard for Ubuntu 22.04's tmux 3.2a.
%if #{>=:#{version},3.3}
set -g allow-passthrough on
%endif
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
